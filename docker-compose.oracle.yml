name: flowforge

# Oracle override — add Oracle XE/Free to the stack for Oracle pipeline testing.
# Usage: docker compose -f docker-compose.yml -f docker-compose.oracle.yml up
#
# Required env vars (set in .env):
#   ORACLE_PASSWORD      — SYS/SYSTEM password
#   APP_USER_PASSWORD    — password for the 'oracle' app user

services:
  oracle:
    image: gvenzl/oracle-free:23-slim@sha256:fbbd3023d5abc33e36d3814816e6fd740e8efabeaa70cf470ddeab5874a3f6f8
    restart: unless-stopped
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:?Set ORACLE_PASSWORD in .env}
      APP_USER: oracle
      APP_USER_PASSWORD: ${APP_USER_PASSWORD:?Set APP_USER_PASSWORD in .env}
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 180s

volumes:
  oracle_data:
