[alembic]
script_location = flowforge/db/migrations
prepend_sys_path = .
version_path_separator = os

# Database URL is intentionally absent here.
# flowforge/db/migrations/env.py reads FLOWFORGE_DB_URL at runtime and
# injects it via cfg['sqlalchemy.url'] before any connection is made.
# Do NOT add sqlalchemy.url here — it would be picked up by some Alembic
# tooling before env.py runs and would either use a wrong value or fail.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
