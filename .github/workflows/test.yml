name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions: read-all

jobs:
  # ── Backend tests ────────────────────────────────────────────────────────────
  test:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest

    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb
        env:
          POSTGRES_DB: flowforge_test
          POSTGRES_USER: flowforge
          POSTGRES_PASSWORD: testpass  # NOSONAR — ephemeral CI container, not a real credential
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flowforge"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      FLOWFORGE_DB_URL: postgresql://flowforge:testpass@localhost:5432/flowforge_test  # NOSONAR
      FLOWFORGE_SECRET_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      FLOWFORGE_JWT_SECRET:  bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
      FLOWFORGE_TEST_REDIS_URL: redis://localhost:6379/15

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0   # SonarCloud needs full history for blame annotations

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install --require-hashes -r requirements-dev.txt && pip install --no-deps -e .

      - name: Upgrade setuptools (PYSEC-2026-3447)
        run: pip install -U "setuptools>=83.0.0"

      - name: Vulnerability audit
        run: pip-audit

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        run: pytest --tb=short -q --cov=flowforge --cov-branch --cov-report=xml --cov-fail-under=88

      - name: Fuzz / property-based tests (hypothesis)
        run: pytest tests_fuzz/ -q --hypothesis-seed=0

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false

      - name: SonarCloud scan
        if: github.actor != 'dependabot[bot]'
        continue-on-error: true
        uses: SonarSource/sonarcloud-github-action@ba3875ecf642b2129de2b589510c81a8b53dbf4e # master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ── Python SAST ──────────────────────────────────────────────────────────────
  sast:
    name: SAST (bandit)
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install bandit
        run: pip install --require-hashes -r requirements-dev.txt

      - name: Run bandit
        run: bandit -c pyproject.toml -r flowforge/ -ll

  # ── Frontend audit + unit tests ──────────────────────────────────────────────
  frontend:
    name: Frontend (npm audit + vitest)
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Dependency audit
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Lint (ESLint)
        working-directory: frontend
        run: npm run lint

      - name: Run unit tests
        working-directory: frontend
        run: npm test
