name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ── Backend tests ────────────────────────────────────────────────────────────
  test:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: flowforge_test
          POSTGRES_USER: flowforge
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flowforge"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      FLOWFORGE_DB_URL: postgresql://flowforge:testpass@localhost:5432/flowforge_test
      FLOWFORGE_SECRET_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      FLOWFORGE_JWT_SECRET:  bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short -q

  # ── Python SAST ──────────────────────────────────────────────────────────────
  sast:
    name: SAST (bandit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install bandit
        run: pip install "bandit[toml]>=1.7"

      - name: Run bandit
        run: bandit -c pyproject.toml -r flowforge/ -ll

  # ── Frontend audit + unit tests ──────────────────────────────────────────────
  frontend:
    name: Frontend (npm audit + vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Dependency audit
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Run unit tests
        working-directory: frontend
        run: npm test
