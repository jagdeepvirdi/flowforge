name: Release

# Triggered by a version tag push: git tag v1.0.0 && git push --tags
# This workflow:
#   1. Builds the wheel + sdist
#   2. Signs artifacts with SLSA provenance (via actions/attest-build-provenance)
#   3. Creates a GitHub Release with auto-generated release notes
#   4. Attaches the signed wheel/sdist to the release
# The publish.yml workflow then picks up the release and pushes to PyPI.

on:
  push:
    tags:
      - 'v[0-9]*'

permissions: {}

jobs:
  release:
    name: Build, sign, and release
    runs-on: ubuntu-latest

    permissions:
      contents: write       # Create GitHub Release and upload assets
      id-token: write       # OIDC token for SLSA attestation signing
      attestations: write   # Write build provenance attestations

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install build tool
        run: pip install --require-hashes -r requirements-build.txt

      - name: Build wheel and sdist
        run: python -m build

      - name: Generate SLSA provenance attestation
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
