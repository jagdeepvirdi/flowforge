name: Publish to PyPI

# Triggered automatically when a release workflow completes, or manually.
# Requires a PyPI "Trusted Publisher" configured at pypi.org for this repo
# (Settings → Publishing → Add a new publisher → GitHub Actions / OIDC).

on:
  workflow_run:
    workflows: [Release]
    types: [completed]
  workflow_dispatch:

permissions: {}

jobs:
  build:
    name: Build distribution packages
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install build tool
        run: pip install --require-hashes -r requirements-build.txt

      - name: Build wheel and sdist
        run: python -m build

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI (OIDC trusted publishing)
    needs: build
    runs-on: ubuntu-latest
    environment: pypi           # Requires a "pypi" environment in repo settings

    permissions:
      id-token: write           # Required for OIDC token exchange with PyPI

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          attestations: true    # Generates SLSA provenance attestation automatically
