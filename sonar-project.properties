sonar.projectKey=jagdeepvirdi_flowforge
sonar.organization=jagdeepvirdi

# Source paths — production code only
sonar.sources=flowforge,frontend/src
sonar.exclusions=flowforge/db/migrations/**,**/node_modules/**,frontend/src/**/*.test.*,frontend/src/**/__tests__/**,**/*.sql

# Test paths
sonar.tests=tests

# Python version
sonar.python.version=3.11

# Coverage report generated by pytest --cov-report=xml
sonar.python.coverage.reportPaths=coverage.xml

# Exclude frontend from coverage calculation — no TypeScript coverage report is generated.
# Without this, SonarCloud's Zero Coverage Sensor marks all ~8k TS lines as 0%, dragging
# combined coverage to ~37% even though Python coverage is ~80%.
sonar.coverage.exclusions=frontend/src/**
