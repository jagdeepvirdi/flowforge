name: flowforge

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: flowforge
      POSTGRES_USER: flowforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flowforge}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${FLOWFORGE_PORT:-5000}:5000"
    env_file:
      - path: .env
        required: false
    environment:
      FLOWFORGE_DB_URL: postgresql://flowforge:${POSTGRES_PASSWORD:-flowforge}@db:5432/flowforge
      FLOWFORGE_REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - output_files:/app/output
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health', timeout=4)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  scheduler:
    build: .
    restart: unless-stopped
    command: ["flowforge", "schedule"]
    env_file:
      - path: .env
        required: false
    environment:
      FLOWFORGE_DB_URL: postgresql://flowforge:${POSTGRES_PASSWORD:-flowforge}@db:5432/flowforge
      FLOWFORGE_REDIS_URL: redis://redis:6379/0
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - output_files:/app/output

  worker:
    build: .
    restart: unless-stopped
    command: ["celery", "-A", "flowforge.celery_app", "worker", "--loglevel=info"]
    env_file:
      - path: .env
        required: false
    environment:
      FLOWFORGE_DB_URL: postgresql://flowforge:${POSTGRES_PASSWORD:-flowforge}@db:5432/flowforge
      FLOWFORGE_REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - output_files:/app/output

volumes:
  postgres_data:
  output_files:
