services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: flowforge
      POSTGRES_USER: flowforge
      POSTGRES_PASSWORD: flowforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${FLOWFORGE_PORT:-5000}:5000"
    env_file:
      - path: .env
        required: false
    environment:
      FLOWFORGE_DB_URL: postgresql://flowforge:flowforge@db:5432/flowforge
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - output_files:/app/output

volumes:
  postgres_data:
  output_files:
