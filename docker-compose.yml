name: flowforge-oracle

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: flowforge
      POSTGRES_USER: flowforge
      POSTGRES_PASSWORD: flowforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${FLOWFORGE_PORT:-5000}:5000"
    env_file:
      - path: .env
        required: false
    environment:
      FLOWFORGE_DB_URL: postgresql://flowforge:flowforge@db:5432/flowforge
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - output_files:/app/output
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health', timeout=4)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  scheduler:
    build: .
    restart: unless-stopped
    command: ["flowforge", "schedule"]
    env_file:
      - path: .env
        required: false
    environment:
      FLOWFORGE_DB_URL: postgresql://flowforge:flowforge@db:5432/flowforge
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - output_files:/app/output

  oracle:
    image: gvenzl/oracle-free:23-slim
    restart: unless-stopped
    environment:
      ORACLE_PASSWORD: harpal123
      APP_USER: oracle
      APP_USER_PASSWORD: harpal123
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 180s

volumes:
  postgres_data:
  oracle_data:
  output_files:
