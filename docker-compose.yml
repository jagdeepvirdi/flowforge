name: flowforge

services:
  db:
    image: postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb
    restart: unless-stopped
    environment:
      POSTGRES_DB: flowforge
      POSTGRES_USER: flowforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env -- see .env.example}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${FLOWFORGE_PORT:-5000}:5000"
    env_file:
      - path: .env
        required: false
    environment:
      FLOWFORGE_DB_URL: postgresql://flowforge:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env -- see .env.example}@db:5432/flowforge
      FLOWFORGE_REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - output_files:/app/output
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health', timeout=4)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  scheduler:
    build: .
    restart: unless-stopped
    command: ["flowforge", "schedule"]
    env_file:
      - path: .env
        required: false
    environment:
      FLOWFORGE_DB_URL: postgresql://flowforge:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env -- see .env.example}@db:5432/flowforge
      FLOWFORGE_REDIS_URL: redis://redis:6379/0
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - output_files:/app/output

  worker:
    build: .
    restart: unless-stopped
    command: ["celery", "-A", "flowforge.celery_app", "worker", "--loglevel=info"]
    env_file:
      - path: .env
        required: false
    environment:
      FLOWFORGE_DB_URL: postgresql://flowforge:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env -- see .env.example}@db:5432/flowforge
      FLOWFORGE_REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - output_files:/app/output

  # ── Optional monitoring services (start with: docker compose --profile monitoring up) ──
  flower:
    build: .
    restart: unless-stopped
    command: ["celery", "-A", "flowforge.celery_app", "flower", "--port=5555"]
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    env_file:
      - path: .env
        required: false
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      FLOWER_BASIC_AUTH: ${FLOWER_BASIC_AUTH:?set FLOWER_BASIC_AUTH (user:pass) in .env -- see .env.example}
      FLOWFORGE_DB_URL: postgresql://flowforge:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env -- see .env.example}@db:5432/flowforge
      FLOWFORGE_REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - monitoring

volumes:
  postgres_data:
  output_files:
