name: flowforge-sample-db

services:
  retail-db:
    image: postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb
    container_name: flowforge_retail_sample
    ports:
      - "5439:5432"
    environment:
      POSTGRES_DB: retail_sample
      POSTGRES_USER: retail
      POSTGRES_PASSWORD: retail123  # NOSONAR — sample/demo database only, not a production credential
    volumes:
      - ./sample_data/retail_db/init:/docker-entrypoint-initdb.d:ro
      - retail_sample_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retail -d retail_sample"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  retail_sample_data:
